name: Commit e PR - Main

on:
  push:
    branches:
       - "*"
  pull_request:
    branches:
      - "*"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Instalando dependências
      run: npm ci

    - name: Teste binário
      run: npm run test
