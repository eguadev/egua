name: Publish NPM

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    runs-on: ubuntu-latest

    # Trusted Publishing (OIDC): o npm aceita o publish deste workflow sem token,
    # conforme configurado em npmjs.com > pacote egua > Settings > Trusted Publisher.
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        # Node 24 traz npm >= 11.5.1, requisito do Trusted Publishing
        node-version: '24.x'
        registry-url: 'https://registry.npmjs.org'

    - name: Instalando dependências
      run: npm ci

    - name: Testando binário
      run: npm run test

    - name: Publicando NPM
      run: npm publish

  tests_package:
    runs-on: ubuntu-latest
    needs: publish

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24.x'

    - name: Funcionamento de pacote
      run: |
          sudo npm i -g egua
          egua tests/tests.egua
