# Site de documentação (egua.dev)
# Este arquivo vale para o site Netlify cujo "base directory" é apps/site.
# A Netlify instala as dependências (npm ci) automaticamente antes do comando de build.
# O caminho de publish é relativo ao base directory.

[build]
  command = "npm run build"
  publish = ".vitepress/dist"

[build.environment]
  NODE_VERSION = "22"

# O VitePress (cleanUrls: true) gera URLs sem ".html", mas o Netlify também
# serve o arquivo bruto na URL com ".html", criando conteúdo duplicado sem
# canonical. Estes redirects consolidam tudo na URL limpa.
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/egua/index.html"
  to = "/egua/"
  status = 301
  force = true

[[redirects]]
  from = "/logica/index.html"
  to = "/logica/"
  status = 301
  force = true

[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true
